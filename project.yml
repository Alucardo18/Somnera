name: Somnera
options:
  bundleIdPrefix: com.somnera
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.emmanueldev.somnera
    MARKETING_VERSION: 2.0.1
    CURRENT_PROJECT_VERSION: 3
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    TARGETED_DEVICE_FAMILY: "1"        # iPhone only
    ENABLE_HARDENED_RUNTIME: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  Somnera:
    type: application
    platform: iOS
    sources:
      - path: Somnera
        excludes:
          - "**/*.md"

    info:
      path: Somnera/Info.plist
      properties:
        # Privacy descriptions — required by App Store & iOS runtime
        NSMicrophoneUsageDescription: "Somnera usa el micrófono para detectar y grabar ronquidos y pausas respiratorias durante tu sueño. Todo el procesamiento ocurre en tu dispositivo."
        NSHealthShareUsageDescription: "Somnera lee tu historial de sueño para mostrar tendencias y comparar con tus sesiones."
        NSHealthUpdateUsageDescription: "Somnera guarda tus sesiones de sueño en Apple Health para que puedas verlas junto con otros datos de salud."
        NSMotionUsageDescription: "Somnera usa los sensores de movimiento para validar las pausas respiratorias y asegurar que los diagnósticos sean precisos."
        # Background audio (critical for overnight recording)
        UIBackgroundModes:
          - audio
        # UI
        UIUserInterfaceStyle: Dark
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        LSRequiresIPhoneOS: true
        CFBundleDisplayName: Somnera

    entitlements:
      path: Somnera/Somnera.entitlements
    settings:
      base:
        PRODUCT_NAME: Somnera
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""            # ← Añade tu Team ID aquí
    dependencies:
      []                               # No external dependencies — all Apple frameworks
    capabilities:
      healthKit: {}
      backgroundModes:
        modes:
          - audio

schemes:
  Somnera:
    build:
      targets:
        Somnera: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
